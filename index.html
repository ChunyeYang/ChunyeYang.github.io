<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Chunye Yang</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f5efe6;
        --fg: #18202a;
        --accent: #b85c38;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          radial-gradient(circle at top, rgba(184, 92, 56, 0.14), transparent 40%),
          linear-gradient(180deg, #f7f0e7 0%, var(--bg) 100%);
        color: var(--fg);
        font-family: Georgia, "Times New Roman", serif;
      }

      main {
        width: min(720px, 100%);
        padding: 48px 40px;
        border: 1px solid rgba(24, 32, 42, 0.1);
        background: rgba(255, 255, 255, 0.72);
        backdrop-filter: blur(8px);
        box-shadow: 0 24px 60px rgba(24, 32, 42, 0.08);
      }

      p {
        margin: 0;
        font-size: 18px;
        line-height: 1.7;
      }

      .eyebrow {
        margin-bottom: 16px;
        color: var(--accent);
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 0.24em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0 0 18px;
        font-size: clamp(42px, 7vw, 72px);
        line-height: 0.95;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="eyebrow">GitHub Pages</div>
      <h1>Site in Progress</h1>
      <p>
        This repository is ready for deployment. The full website design and content
        will be added next.
      </p>
    </main>
  </body>
</html>
